<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Popup</title>
    <link rel="stylesheet" href="stylesheet.css" />
</head>

<body style="background: transparent; margin: 0; padding: 0;">
    <div id="popup-container" class="slide-in">
        <div class="popup-header">
            <span id="popup-header-text">Time goal remaining: --:--:--</span>
        </div>

        <div class="popup-body">
            <p id="popup-message">Timer started, have fun!</p>

            <button id="popup-accept-btn" class="popup-accept-btn">
                ✓ Accept
            </button>
        </div>
    </div>
    <script src="../dist/popup.js"></script>
</body>
</html>
