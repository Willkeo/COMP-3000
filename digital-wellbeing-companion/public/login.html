<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Digital Wellbeing Companion</title>
    <link rel="stylesheet" href="StyleSheet.css" />
</head>
<body>
    <div class="container">
        <h1>Welcome back!</h1>

        <label>Username:</label>
        <input id="username" type="text" placeholder="Enter username" />

        <label>Password:</label>
        <input id="password" type="password" placeholder="Enter password" />

        <button class="text-btn">Forgot password</button>

        <button id="login-btn" class="main-btn">▶ Login</button>

        <div class="account-section">
            <p>Don’t have an account?</p>
            <button id="register-btn" class="secondary-btn">+ Create account</button>
        </div>
    </div>

    <script src="../dist/login.js"></script>
</body>
</html>
